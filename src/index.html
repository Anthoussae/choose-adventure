<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ark Ship Odyssey</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page">
      <aside class="sidebar">
        <div class="section sticky-panel">
          <h2>Current Configuration:</h2>

          <div class="current-points">
            Points Remaining: <span id="points-remaining"></span>
          </div>

          <ul id="current-setup"></ul>
        </div>
      </aside>

      <main class="main-content">
        <div class="section">
          <h1>Ark Ship Odyssey</h1>
          <p id="title-text"></p>

          <div class="top-controls">
            <button id="reset-button" type="button">Reset</button>
            <button id="hard-button" type="button">Hard (100)</button>
            <button id="medium-button" type="button">Medium (150)</button>
            <button id="easy-button" type="button">Easy (200)</button>
          </div>
        </div>

        <div class="section" id="options-section">
          <h2>Available Options:</h2>
          <p id="options-intro"></p>
          <div id="options-container"></div>
        </div>
      </main>
    </div>
    <script src="main.js"></script>
  </body>
</html>
